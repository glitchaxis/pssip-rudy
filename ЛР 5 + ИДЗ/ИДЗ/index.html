<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="order-form-container">
    <h2 class="form-main-title">Форма заказа</h2>
    <form class="custom-order-form">
        <div class="form-item">
            <label>Название организации</label>
            <input type="text" name="org_name">
        </div>

        <div class="form-item">
            <label>ОГРН/ИНН</label>
            <input type="text" name="inn">
        </div>

        <div class="form-row">
            <div class="form-item flex-2">
                <label>Диаметр печати/размер штампа<span class="required">*</span></label>
                <input type="text" required>
            </div>
            <div class="form-item flex-1">
                <label>Тип оснастки<span class="required">*</span></label>
                <select required>
                    <option value="" disabled selected hidden>Выберите...</option>
                    <option>Ручная</option>
                    <option>Автоматическая</option>
                </select>
            </div>
        </div>

        <div class="form-item">
            <label>Количество</label>
            <input type="number" name="count">
        </div>

        <div class="form-item">
            <label>Срок изготовления<span class="required">*</span></label>
            <select required>
                <option value="" disabled selected hidden>Выберите срок...</option>
                <option>Срочно</option>
                <option>В обычном режиме</option>
            </select>
        </div>

        <div class="form-item">
            <label>Загрузка файла</label>
            <p class="file-hint">Файл графического формата и формата MS Word, не более 10Мб</p>
            <div class="file-input-wrapper">
                <input type="file">
            </div>
        </div>

        <div class="form-item">
            <label>Контактное лицо</label>
            <input type="text">
        </div>

        <div class="form-item">
            <label>Контактный телефон<span class="required">*</span></label>
            <input type="tel" required>
        </div>

        <div class="form-item">
            <label>Контактный e-mail<span class="required">*</span></label>
            <input type="email" required>
        </div>

        <div class="form-item">
            <label>Ваши комментарии</label>
            <textarea rows="5"></textarea>
        </div>

        <p class="required-note"><span class="required">*</span> Поля обязательные для заполнения</p>
        
        <button type="submit" class="form-submit-btn">Отправить</button>
    </form>
</div>

    <div class="product-card">
        <div class="product-image">
            <img src="content/dress.png" alt="Платье Versace">
        </div>
        <div class="product-info">
            <div class="product-header">
                <h3 class="product-name">ПЛАТЬЕ VERSACE</h3>
                <div class="rating">★★★★☆</div>
            </div>
            <p class="product-desc">Современное платье Версаче разработано для элегантных и уверенных в себе дам.</p>
            
            <div class="product-options">
                <div class="option-row">
                    <span>Размер:</span>
                    <div class="size-chips">
                        <span class="chip active">42</span>
                        <span class="chip">S</span>
                        <span class="chip">M</span>
                        <span class="chip">L</span>
                    </div>
                </div>
            </div>

            <div class="product-footer">
                <span class="price">42 900 руб.</span>
                <button class="cart-btn">В КОРЗИНУ</button>
            </div>
        </div>
    </div>
</body>
</html>
